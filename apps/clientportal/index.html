<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1D9E75" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="4M Portal" />
    <title>4M Client Portal</title>
  </head>
  <body>
    <div class="shell">
      <!-- SIDEBAR -->
      <div class="sidebar" id="sidebar">
        <div class="logo">
          <div class="logo-title">4M PROGRAM</div>
          <div class="logo-sub">MONTH 1 WORKBOOK</div>
          <div class="logo-name" id="sb-name"></div>
        </div>
        <div id="nav-items"></div>
        <div class="sb-stats" style="margin-top:8px">
          <div class="sb-stats-title">PROGRESS</div>
          <div class="sb-stat" id="sb-audit">Audit: 0 / 14 factors</div>
          <div class="sb-stat" id="sb-score">Score: — / 70</div>
          <div class="sb-stat" id="sb-morn">Mornings: 0 days</div>
          <div class="sb-stat" id="sb-cold">Cold showers: 0 days</div>
        </div>
      </div>
      <!-- MAIN -->
      <div class="main" id="main-content"></div>
    </div>
    <div id="toast"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
